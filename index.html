<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מחשבון IP Subnet - בסגנון BitCricket</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f4f8;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 650px;
            margin: 0 auto;
            background: #ffffff;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border-top: 5px solid #0056b3;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-top: 0;
        }
        .input-group {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        .input-field {
            flex: 2;
            display: flex;
            flex-direction: column;
        }
        .input-field.short {
            flex: 1;
        }
        label {
            font-weight: bold;
            margin-bottom: 5px;
            color: #555;
        }
        input, select {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
            text-align: left;
            direction: ltr;
        }
        .results-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        .results-table th, .results-table td {
            padding: 12px;
            text-align: right;
            border-bottom: 1px solid #e0e0e0;
        }
        .results-table th {
            background-color: #f7f9fa;
            color: #333;
            width: 40%;
        }
        .results-table td {
            font-family: monospace;
            font-size: 15px;
            color: #002b5c;
            direction: ltr;
        }
        .binary-text {
            color: #28a745 !important;
            word-break: break-all;
        }
        .error {
            color: red;
            font-weight: bold;
            text-align: center;
            margin-bottom: 15px;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>מחשבון IP Subnet (BitCricket Clone)</h2>
    
    <div id="error-msg" class="error">כתובת IP לא תקינה</div>

    <div class="input-group">
        <div class="input-field">
            <label for="ip-address">כתובת IP (IPv4):</label>
            <input type="text" id="ip-address" value="192.168.1.1" placeholder="e.g. 192.168.1.1">
        </div>
        <div class="input-field short">
            <label for="cidr">CIDR (Prefix):</label>
            <select id="cidr"></select>
        </div>
    </div>

    <table class="results-table">
        <tr>
            <th>Subnet Mask (מסיכת רשת):</th>
            <td id="res-mask"></td>
        </tr>
        <tr>
            <th>Network Address (כתובת רשת):</th>
            <td id="res-net-addr"></td>
        </tr>
        <tr>
            <th>Broadcast Address (כתובת ברודקאסט):</th>
            <td id="res-broad-addr"></td>
        </tr>
        <tr>
            <th>Usable Host Range (טווח כתובות זמינות):</th>
            <td id="res-range"></td>
        </tr>
        <tr>
            <th>Total Usable Hosts (סה"כ מחשבים ברשת):</th>
            <td id="res-hosts"></td>
        </tr>
        <tr>
            <th>IP Class (מחלקה):</th>
            <td id="res-class" style="text-align: right; direction: rtl;"></td>
        </tr>
        <tr>
            <th>IP Binary (ייצוג בינארי):</th>
            <td id="res-bin-ip" class="binary-text"></td>
        </tr>
        <tr>
            <th>Mask Binary (מסיכה בבינארי):</th>
            <td id="res-bin-mask" class="binary-text"></td>
        </tr>
    </table>
</div>

<script>
    // תפריט בחירת מסיכת רשת (CIDR) מ-/1 עד /32
    const cidrSelect = document.getElementById('cidr');
    for (let i = 32; i >= 1; i--) {
        let opt = document.createElement('option');
        opt.value = i;
        opt.textContent = `/${i}`;
        if (i === 24) opt.selected = true; // ברירת מחדל כמו ברוב הרשתות
        cidrSelect.appendChild(opt);
    }

    // מאזיני אירועים לעדכון מיידי בזמן הקלדה/שינוי
    document.getElementById('ip-address').addEventListener('input', calculateSubnet);
    cidrSelect.addEventListener('change', calculateSubnet);

    // פונקציית החישוב המרכזית
    function calculateSubnet() {
        const ipStr = document.getElementById('ip-address').value.trim();
        const cidr = parseInt(cidrSelect.value);
        const errorDiv = document.getElementById('error-msg');
        
        // ולידציה בסיסית לפורמט ה-IP
        const ipParts = ipStr.split('.');
        if (ipParts.length !== 4 || ipParts.some(part => part === '' || isNaN(part) || part < 0 || part > 255)) {
            errorDiv.style.display = 'block';
            return;
        }
        errorDiv.style.display = 'none';

        // המרת ה-IP למספר של 32 סיביות (Bitwise)
        const ipNum = (parseInt(ipParts[0]) << 24) >>> 0 |
                      (parseInt(ipParts[1]) << 16) >>> 0 |
                      (parseInt(ipParts[2]) << 8)  >>> 0 |
                      (parseInt(ipParts[3]))       >>> 0;

        // חישוב מסיכת הרשת (Mask) לפי ה-CIDR
        const maskNum = cidr === 0 ? 0 : (~0 << (32 - cidr)) >>> 0;

        // חישוב כתובת הרשת והברודקאסט
        const netNum = (ipNum & maskNum) >>> 0;
        const broadNum = (netNum | ~maskNum) >>> 0;

        // חישוב כמות השרתים הזמינים (Usable Hosts)
        let usableHosts = (broadNum - netNum) - 1;
        if (usableHosts < 0) usableHosts = 0;
        if (cidr === 31) usableHosts = 2; // מקרה קצה מיוחד של RFC 3021
        if (cidr === 32) usableHosts = 1;

        // חישוב טווח הכתובות הזמינות
        let rangeStr = "";
        if (cidr <= 30) {
            rangeStr = `${numToIp(netNum + 1)} - ${numToIp(broadNum - 1)}`;
        } else if (cidr === 31) {
            rangeStr = `${numToIp(netNum)} - ${numToIp(broadNum)}`;
        } else {
            rangeStr = numToIp(netNum);
        }

        // קביעת מחלקת ה-IP (Class) לפי הביטים הראשונים
        let ipClass = "Classless (CIDR)";
        const firstOctet = parseInt(ipParts[0]);
        if (firstOctet >= 1 && firstOctet <= 126) ipClass = "Class A (מחלקה א')";
        else if (firstOctet >= 128 && firstOctet <= 191) ipClass = "Class B (מחלקה ב')";
        else if (firstOctet >= 192 && firstOctet <= 223) ipClass = "Class C (מחלקה ג')";
        else if (firstOctet >= 224 && firstOctet <= 239) ipClass = "Class D (Multicast)";
        else if (firstOctet >= 240 && firstOctet <= 254) ipClass = "Class E (Experimental)";

        // עדכון התוצאות על המסך
        document.getElementById('res-mask').textContent = numToIp(maskNum);
        document.getElementById('res-net-addr').textContent = numToIp(netNum);
        document.getElementById('res-broad-addr').textContent = numToIp(broadNum);
        document.getElementById('res-range').textContent = rangeStr;
        document.getElementById('res-hosts').textContent = usableHosts.toLocaleString();
        document.getElementById('res-class').textContent = ipClass;
        document.getElementById('res-bin-ip').textContent = numToBinary(ipNum);
        document.getElementById('res-bin-mask').textContent = numToBinary(maskNum);
    }

    // פונקציית עזר להמרת מספר בחזרה למחרוזת IP (דוגמה: 192.168.1.1)
    function numToIp(num) {
        return [
            (num >>> 24) & 255,
            (num >>> 16) & 255,
            (num >>> 8) & 255,
            num & 255
        ].join('.');
    }

    // פונקציית עזר להמרת מספר לייצוג בינארי עם רווחים (נקודות) בין האוקטטות
    function numToBinary(num) {
        let binStr = (num >>> 0).toString(2).padStart(32, '0');
        return binStr.match(/.{1,8}/g).join('.');
    }

    // הרצה ראשונית של החישוב עם טעינת הדף
    calculateSubnet();
</script>

</body>
</html>
